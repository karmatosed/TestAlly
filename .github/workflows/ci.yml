name: Build and Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build dev image
        run: make dev-image

      - name: Build
        run: make build

      - name: Test
        run: make test
